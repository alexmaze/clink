mode: symlink   # 全局默认模式（可选，默认 symlink）

hooks:
  pre: echo '[pre-all] 准备开始链接配置文件'
  post: echo '[post-all] 所有配置文件已链接完成'

vars:
  home: /Users/alex/Dev/workspace/alex/clink/testdata/dest/home
  v2ray_conf: /Users/alex/Dev/workspace/alex/clink/testdata/dest/home/.config/v2ray

# SSH 服务器定义（ssh 模式使用）
# ssh_servers:
#   my-server:
#     host: 192.168.1.1
#     port: 22
#     user: root
#     key: ~/.ssh/id_rsa   # key 与 password 二选一；都不填则运行时 prompt

rules:
  - name: vim 配置
    # mode 不写则继承全局（此处为 symlink）
    hooks:
      pre: echo '[pre-rule] 检查 vim 环境'
      post: echo '[post-rule] vim 配置完成'
    items:
      - src: ./dotfiles/.vimrc
        dest: ${home}/.vimrc
      - src: ./dotfiles/.vim/autoload
        dest: ${home}/.vim/autoload

  - name: v2ray 配置
    items:
      - src: ./dotfiles/v2ray/config.json
        dest: ${v2ray_conf}/config.json

  - name: vim 配置 (copy 模式示例)
    mode: copy
    items:
      - src: ./dotfiles/.vimrc
        dest: ${home}/.vimrc_copy

  # SSH 模式示例（需要可达的 SSH 服务器，取消注释并填写真实服务器信息后使用）
  # - name: 远程服务器配置
  #   mode: ssh
  #   ssh: my-server      # 引用 ssh_servers 中的 key
  #   items:
  #     - src: ./dotfiles/.vimrc
  #       dest: /root/.vimrc   # 远程路径，不做本地路径处理
